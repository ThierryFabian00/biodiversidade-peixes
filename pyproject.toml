[tool.ruff]
target-version = "py312"
line-length = 88
extend-exclude = ["notebooks"]

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F", "I", "B"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"tests/*.py" = ["B017"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
